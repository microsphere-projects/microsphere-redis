microsphere:
  spring:
    cloud:
      features:
        abstract:
          spring-data-redis:
            - org.springframework.data.redis.core.RedisTemplate
            - org.springframework.data.redis.core.StringRedisTemplate
            - org.springframework.data.redis.core.ReactiveRedisTemplate
            - org.springframework.data.redis.core.ReactiveStringRedisTemplate
            - org.springframework.data.redis.connection.RedisConnectionFactory
            - org.springframework.data.redis.connection.ReactiveRedisConnectionFactory
            - org.springframework.data.redis.connection.RedisConfiguration
            - org.springframework.data.redis.cache.RedisCacheManager
            - org.springframework.data.redis.cache.RedisCacheConfiguration
          redis-spring-boot:
            - org.springframework.boot.autoconfigure.cache.CacheManagerCustomizer
            - org.springframework.boot.autoconfigure.cache.RedisCacheManagerBuilderCustomizer
            - org.springframework.boot.autoconfigure.data.redis.ClientResourcesBuilderCustomizer
            - org.springframework.boot.autoconfigure.data.redis.JedisClientConfigurationBuilderCustomizer
            - org.springframework.boot.autoconfigure.data.redis.LettuceClientConfigurationBuilderCustomizer
            ## Spring Boot 3.4+
            - org.springframework.boot.autoconfigure.data.redis.LettuceClientOptionsBuilderCustomizer
            ## Spring Boot 3.1+
            - org.springframework.boot.autoconfigure.data.redis.RedisConnectionDetails
          microsphere-redis-spring:
            - io.microsphere.redis.spring.config.RedisConfiguration
            - io.microsphere.redis.spring.context.RedisContext
            - io.microsphere.redis.spring.interceptor.RedisCommandInterceptor
            - io.microsphere.redis.spring.interceptor.RedisConnectionInterceptor
            - io.microsphere.redis.spring.connection.dynamic.DynamicRedisConnectionFactory
          microsphere-redis-spring-cloud:
            - io.microsphere.redis.spring.cloud.event.PropagatingRedisConfigurationPropertyChangedEventApplicationListener

        named:
          microsphere-redis-spring:
            RedisMetadataLoader: io.microsphere.redis.spring.metadata.SpringRedisMetadataLoader
            BooleanSerializer: io.microsphere.redis.spring.serializer.BooleanSerializer
            BoundarySerializer: io.microsphere.redis.spring.serializer.BoundarySerializer
            ByteArraySerializer: io.microsphere.redis.spring.serializer.ByteArraySerializer
            DoubleSerializer: io.microsphere.redis.spring.serializer.DoubleSerializer
            EnumSerializer: io.microsphere.redis.spring.serializer.EnumSerializer
            ExpirationSerializer: io.microsphere.redis.spring.serializer.ExpirationSerializer
            GeoLocationSerializer: io.microsphere.redis.spring.serializer.GeoLocationSerializer
            IntegerSerializer: io.microsphere.redis.spring.serializer.IntegerSerializer
            LongSerializer: io.microsphere.redis.spring.serializer.LongSerializer
            PointSerializer: io.microsphere.redis.spring.serializer.PointSerializer
            RangeSerializer: io.microsphere.redis.spring.serializer.RangeSerializer
            RedisCommandEventSerializer: io.microsphere.redis.spring.serializer.RedisCommandEventSerializer
            RedisZSetCommandsRangeSerializer: io.microsphere.redis.spring.serializer.RedisZSetCommandsRangeSerializer
            ShortSerializer: io.microsphere.redis.spring.serializer.ShortSerializer
            SortParametersSerializer: io.microsphere.redis.spring.serializer.SortParametersSerializer
            WeightsSerializer: io.microsphere.redis.spring.serializer.WeightsSerializer
          microsphere-redis-spring-boot:
            ConditionalOnRedisAvailable: io.microsphere.redis.spring.boot.autoconfigure.condition.ConditionalOnRedisAvailable
            ConditionalOnRedisEnabled: io.microsphere.redis.spring.boot.autoconfigure.condition.ConditionalOnRedisEnabled
            ConditionalOnRedisInterceptorEnabled: io.microsphere.redis.spring.boot.autoconfigure.condition.ConditionalOnRedisInterceptorEnabled